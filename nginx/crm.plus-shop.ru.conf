# Beauty.dev — vhost for the host (system) nginx.
# Drop into /etc/nginx/sites-available/crm.plus-shop.ru and symlink into
# /etc/nginx/sites-enabled/. Then run `certbot --nginx -d crm.plus-shop.ru`
# (it will inject ssl_* directives + the 80 → 443 redirect block).

server {
    listen 80;
    listen [::]:80;
    server_name crm.plus-shop.ru;

    # Sized for portfolio uploads (PORTFOLIO_MAX_FILE_SIZE_MB = 10 by default).
    client_max_body_size 12m;

    # Mini App static bundle — built into this directory by the
    # `frontend-build` one-shot service in docker-compose.host-nginx.yml.
    root /var/www/crm.plus-shop.ru;
    index index.html;

    # Master photos — backend container writes here via bind-mount.
    location /portfolio/ {
        alias /var/www/portfolio/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin * always;
    }

    # API — reverse-proxy to the dockerized backend.
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # SPA fallback for the React Router routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed assets.
    location ~* \.(?:js|css|woff2|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Telegram Mini App embedding.
    add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-Content-Type-Options nosniff always;
}
