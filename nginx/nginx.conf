user nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 12m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ----- HTTP: ACME challenge + redirect to HTTPS --------------------------
    server {
        listen 80;
        server_name crm.plus-shop.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- HTTPS: Mini App + API + portfolio --------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name crm.plus-shop.ru;

        ssl_certificate     /etc/letsencrypt/live/crm.plus-shop.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/crm.plus-shop.ru/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # Telegram Mini App embedding hardening.
        add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header X-Content-Type-Options nosniff always;

        # ----- API: reverse-proxy to FastAPI -----
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_read_timeout 60s;
        }

        # ----- Portfolio static (master photos) -----
        location /portfolio/ {
            alias /var/www/portfolio/;
            access_log off;
            expires 7d;
            add_header Cache-Control "public, immutable";
            # CORS so Telegram CDN can fetch.
            add_header Access-Control-Allow-Origin * always;
        }

        # ----- Mini App static bundle -----
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Long cache for hashed assets.
        location ~* \.(?:js|css|woff2|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
    }
}
