# Production overrides — будет дополнено на Этапе 12 (deploy на Timeweb Cloud).
# Использование: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    restart: always
    volumes: []

  frontend:
    command: pnpm preview --host 0.0.0.0
    restart: always
    volumes: []
