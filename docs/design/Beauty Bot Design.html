<!doctype html>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

            <MasterChatList />
          </DCArtboard>
          <DCArtboard id="cb-bot" label="2 · Бот ведёт ★" width={320} height={660}>

            <AnOverview />
          </DCArtboard>
          <DCArtboard id="an-fin" label="2 · Финансы" width={320} height={660}>

          <DCArtboard id="an-cli" label="3 · Удержание" width={320} height={660}>

          <DCArtboard id="an-srv" label="5 · Услуги" width={320} height={660}>
            <AnServices />
          </DCArtboard>
          <DCArtboard id="an-ins" label="6 · Инсайты ★" width={320} height={660}>
            <AnInsights />
          </DCArtboard>
          <DCArtboard id="an-cmp" label="7 · Сравнение периодов" width={320} height={660}>
