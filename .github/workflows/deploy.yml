name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required GitHub repo secrets:
#   SSH_HOST            — server IP (e.g. 31.130.150.174)
#   SSH_USER            — typically "root"
#   SSH_PASSWORD        — server password (use SSH_PRIVATE_KEY in production)
#   PROJECT_DIR         — absolute path on the server, e.g. /opt/beauty-bot

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [] # CI workflow runs in parallel; we don't gate on it for fast deploys
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd ${{ secrets.PROJECT_DIR }}
            git fetch --depth=50 origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml pull || true
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            # Migrations are run by the backend entrypoint command, but we also
            # invoke them here so a deploy that only changes Alembic files
            # picks them up before the new image's command rolls.
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker image prune -f
