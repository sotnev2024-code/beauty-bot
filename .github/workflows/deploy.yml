name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required GitHub repo secrets:
#   SSH_HOST            — server IP (e.g. 31.130.150.174)
#   SSH_USER            — typically "root"
#   SSH_PASSWORD        — server password (use SSH_PRIVATE_KEY in production)
#   SSH_PORT            — SSH port on the server (e.g. 2222); falls back to 22 if unset
#   PROJECT_DIR         — absolute path on the server, e.g. /opt/beauty-bot
#   COMPOSE_FILE        — compose filename on the server (default docker-compose.host-nginx.yml)

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: [] # CI workflow runs in parallel; we don't gate on it for fast deploys
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          COMPOSE_FILE: ${{ secrets.COMPOSE_FILE || 'docker-compose.host-nginx.yml' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          envs: COMPOSE_FILE
          script: |
            set -euo pipefail
            cd ${{ secrets.PROJECT_DIR }}
            git fetch --depth=50 origin main
            git reset --hard origin/main
            docker compose -f "$COMPOSE_FILE" pull || true
            docker compose -f "$COMPOSE_FILE" build
            docker compose -f "$COMPOSE_FILE" up -d
            # Migrations are run by the backend entrypoint command, but we also
            # invoke them here so a deploy that only changes Alembic files
            # picks them up before the new image's command rolls.
            docker compose -f "$COMPOSE_FILE" exec -T backend alembic upgrade head
            docker image prune -f
